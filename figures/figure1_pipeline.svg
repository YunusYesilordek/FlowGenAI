<?xml version="1.0" encoding="UTF-8"?>
<svg width="460" height="670" viewBox="0 0 460 670"
     xmlns="http://www.w3.org/2000/svg"
     font-family="Times New Roman, Georgia, serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#222"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="230" y="22" text-anchor="middle" font-size="13" font-weight="bold">
    Fig. 1. FlowGenAI System Architecture
  </text>

  <!-- ── ROW 1 ── -->
  <rect x="20" y="36" width="175" height="52" rx="7"
        fill="white" stroke="#555" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="107" y="59" text-anchor="middle" font-size="11" font-style="italic">Business</text>
  <text x="107" y="74" text-anchor="middle" font-size="11" font-style="italic">Requirement Text</text>

  <line x1="195" y1="62" x2="243" y2="62" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="246" y="36" width="188" height="52" rx="9"
        fill="white" stroke="#111" stroke-width="2.2"/>
  <text x="340" y="57" text-anchor="middle" font-size="12" font-weight="bold">1. Input Validation</text>
  <text x="340" y="72" text-anchor="middle" font-size="10">&amp; Pre-processing</text>

  <polyline points="340,88 340,104 107,104 107,115"
            fill="none" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── ROW 2 ── -->
  <rect x="20" y="117" width="175" height="52" rx="7"
        fill="white" stroke="#555" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="107" y="140" text-anchor="middle" font-size="11" font-style="italic">Cleaned &amp; Validated</text>
  <text x="107" y="155" text-anchor="middle" font-size="11" font-style="italic">Requirement</text>

  <line x1="195" y1="143" x2="243" y2="143" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="246" y="117" width="188" height="52" rx="9"
        fill="white" stroke="#111" stroke-width="2.2"/>
  <text x="340" y="140" text-anchor="middle" font-size="12" font-weight="bold">2. LLM Analysis</text>
  <text x="340" y="155" text-anchor="middle" font-size="10">(GPT-4o-mini via OpenAI API)</text>

  <polyline points="340,169 340,185 107,185 107,196"
            fill="none" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── ROW 3 ── -->
  <rect x="20" y="198" width="175" height="62" rx="7"
        fill="white" stroke="#555" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="107" y="221" text-anchor="middle" font-size="11" font-style="italic">Raw JSON Response</text>
  <text x="107" y="236" text-anchor="middle" font-size="10" font-style="italic">(actors, trigger, flows,</text>
  <text x="107" y="251" text-anchor="middle" font-size="10" font-style="italic">relationships, scenarios)</text>

  <line x1="195" y1="229" x2="243" y2="229" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="246" y="198" width="188" height="62" rx="9"
        fill="white" stroke="#111" stroke-width="2.2"/>
  <text x="340" y="221" text-anchor="middle" font-size="12" font-weight="bold">3. JSON Parsing</text>
  <text x="340" y="236" text-anchor="middle" font-size="12" font-weight="bold">&amp; Schema Validation</text>
  <text x="340" y="251" text-anchor="middle" font-size="10">(Pydantic models)</text>

  <polyline points="340,260 340,276 107,276 107,287"
            fill="none" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── ROW 4 ── -->
  <rect x="20" y="289" width="175" height="62" rx="7"
        fill="white" stroke="#555" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="107" y="312" text-anchor="middle" font-size="11" font-style="italic">Validated Use Case Model</text>
  <text x="107" y="327" text-anchor="middle" font-size="10" font-style="italic">actors · trigger · flows</text>
  <text x="107" y="342" text-anchor="middle" font-size="10" font-style="italic">relationships · scenarios</text>

  <line x1="195" y1="320" x2="243" y2="320" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="246" y="289" width="188" height="62" rx="9"
        fill="white" stroke="#111" stroke-width="2.2"/>
  <text x="340" y="312" text-anchor="middle" font-size="12" font-weight="bold">4. Diagram Code</text>
  <text x="340" y="327" text-anchor="middle" font-size="12" font-weight="bold">Generation</text>
  <text x="340" y="342" text-anchor="middle" font-size="10">(_build_plantuml · _build_d2)</text>

  <polyline points="340,351 340,367 107,367 107,378"
            fill="none" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── ROW 5 ── -->
  <rect x="20" y="380" width="175" height="62" rx="7"
        fill="white" stroke="#555" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="107" y="403" text-anchor="middle" font-size="11" font-style="italic">PlantUML &amp; D2</text>
  <text x="107" y="418" text-anchor="middle" font-size="11" font-style="italic">Source Code</text>
  <text x="107" y="433" text-anchor="middle" font-size="10" font-style="italic">+ zlib-encoded URLs</text>

  <line x1="195" y1="411" x2="243" y2="411" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="246" y="380" width="188" height="62" rx="9"
        fill="white" stroke="#111" stroke-width="2.2"/>
  <text x="340" y="403" text-anchor="middle" font-size="12" font-weight="bold">5. Remote Rendering</text>
  <text x="340" y="418" text-anchor="middle" font-size="10">(plantuml.com</text>
  <text x="340" y="433" text-anchor="middle" font-size="10">+ kroki.io)</text>

  <polyline points="340,442 340,458 107,458 107,468"
            fill="none" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── ROW 6: Final Output ── -->
  <rect x="20" y="470" width="175" height="52" rx="7"
        fill="white" stroke="#555" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="107" y="492" text-anchor="middle" font-size="11" font-style="italic">Use Case Diagram/s</text>
  <text x="107" y="507" text-anchor="middle" font-size="10" font-style="italic">(PNG · SVG)</text>

  <!-- ── LEGEND ── -->
  <rect x="20" y="540" width="420" height="118" rx="6" fill="#fafafa" stroke="#bbb" stroke-width="1"/>
  <text x="230" y="558" text-anchor="middle" font-size="11" font-weight="bold">Legend</text>

  <!-- Dashed box -->
  <rect x="35" y="566" width="68" height="26" rx="5" fill="white"
        stroke="#555" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="69" y="583" text-anchor="middle" font-size="10" font-style="italic">Data</text>
  <text x="109" y="583" font-size="10"> = Data / Artifact</text>

  <!-- Solid box -->
  <rect x="248" y="566" width="68" height="26" rx="6" fill="white"
        stroke="#111" stroke-width="2"/>
  <text x="282" y="583" text-anchor="middle" font-size="10" font-weight="bold">Step</text>
  <text x="322" y="583" font-size="10"> = Processing Step</text>

  <!-- Actor stick figure -->
  <circle cx="50" cy="615" r="7" fill="white" stroke="#333" stroke-width="1.5"/>
  <line x1="50" y1="622" x2="50" y2="638" stroke="#333" stroke-width="1.5"/>
  <line x1="42" y1="627" x2="58" y2="627" stroke="#333" stroke-width="1.5"/>
  <line x1="50" y1="638" x2="44" y2="648" stroke="#333" stroke-width="1.5"/>
  <line x1="50" y1="638" x2="56" y2="648" stroke="#333" stroke-width="1.5"/>
  <text x="66" y="632" font-size="10"> = Actor</text>

  <!-- Use Case oval -->
  <ellipse cx="200" cy="628" rx="40" ry="16" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="200" y="632" text-anchor="middle" font-size="9">Use Case</text>
  <text x="246" y="632" font-size="10"> = Use Case</text>

  <!-- include / extend lines -->
  <line x1="35" y1="654" x2="92" y2="654" stroke="#333" stroke-width="1.2"
        stroke-dasharray="4 2" marker-end="url(#arr)"/>
  <text x="96" y="658" font-size="9">&lt;&lt;include&gt;&gt;</text>

  <line x1="218" y1="654" x2="275" y2="654" stroke="#333" stroke-width="1.2"
        stroke-dasharray="4 2" marker-end="url(#arr)"/>
  <text x="279" y="658" font-size="9">&lt;&lt;extend&gt;&gt;</text>
</svg>
