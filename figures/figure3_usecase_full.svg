<?xml version="1.0" encoding="UTF-8"?>
<svg width="620" height="600" viewBox="0 0 620 600"
     xmlns="http://www.w3.org/2000/svg"
     font-family="Times New Roman, Georgia, serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <marker id="open" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polyline points="0 0, 9 3.5, 0 7" fill="none" stroke="#333" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="310" y="20" text-anchor="middle" font-size="13" font-weight="bold">
    Fig. 3. Generated Use Case Diagram — E-Commerce Order System (Full View)
  </text>

  <!-- ─── SYSTEM BOUNDARY ─── -->
  <rect x="120" y="34" width="390" height="530" rx="10"
        fill="white" stroke="#333" stroke-width="2"/>
  <text x="315" y="52" text-anchor="middle" font-size="11" font-weight="bold">«System»</text>
  <text x="315" y="64" text-anchor="middle" font-size="10">E-Commerce Order Management System</text>

  <!-- ─── ACTORS ─── -->
  <!-- Customer (left) -->
  <circle cx="55" cy="180" r="12" fill="white" stroke="#333" stroke-width="1.8"/>
  <line x1="55" y1="192" x2="55" y2="218" stroke="#333" stroke-width="1.8"/>
  <line x1="43" y1="202" x2="67" y2="202" stroke="#333" stroke-width="1.8"/>
  <line x1="55" y1="218" x2="45" y2="234" stroke="#333" stroke-width="1.8"/>
  <line x1="55" y1="218" x2="65" y2="234" stroke="#333" stroke-width="1.8"/>
  <text x="55" y="248" text-anchor="middle" font-size="11">Customer</text>
  <text x="55" y="261" text-anchor="middle" font-size="9" fill="#555">«primary»</text>

  <!-- Payment Gateway (right, top) -->
  <rect x="550" y="148" width="58" height="36" rx="4" fill="#eee" stroke="#333" stroke-width="1.5"/>
  <text x="579" y="163" text-anchor="middle" font-size="9">Payment</text>
  <text x="579" y="175" text-anchor="middle" font-size="9">Gateway</text>
  <text x="579" y="198" text-anchor="middle" font-size="9" fill="#555">«external»</text>

  <!-- Email Service (right, bottom) -->
  <rect x="550" y="390" width="58" height="36" rx="4" fill="#eee" stroke="#333" stroke-width="1.5"/>
  <text x="579" y="405" text-anchor="middle" font-size="9">Email</text>
  <text x="579" y="417" text-anchor="middle" font-size="9">Service</text>
  <text x="579" y="440" text-anchor="middle" font-size="9" fill="#555">«external»</text>

  <!-- ─── USE CASES ─── -->

  <!-- Browse Products -->
  <ellipse cx="240" cy="100" rx="72" ry="22" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="240" y="104" text-anchor="middle" font-size="11">Browse Products</text>

  <!-- Add Item to Cart -->
  <ellipse cx="400" cy="100" rx="72" ry="22" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="400" y="104" text-anchor="middle" font-size="11">Add Item to Cart</text>

  <!-- Place Order -->
  <ellipse cx="240" cy="200" rx="72" ry="22" fill="white" stroke="#333" stroke-width="1.8"/>
  <text x="240" y="204" text-anchor="middle" font-size="11" font-weight="bold">Place Order</text>

  <!-- Cancel Order -->
  <ellipse cx="400" cy="200" rx="72" ry="22" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="400" y="204" text-anchor="middle" font-size="11">Cancel Order</text>

  <!-- Process Payment -->
  <ellipse cx="320" cy="310" rx="78" ry="22" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="320" y="314" text-anchor="middle" font-size="11">Process Payment</text>

  <!-- Process Refund -->
  <ellipse cx="430" cy="390" rx="72" ry="22" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="430" y="394" text-anchor="middle" font-size="11">Process Refund</text>

  <!-- Send Confirmation -->
  <ellipse cx="290" cy="480" rx="85" ry="22" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="290" y="484" text-anchor="middle" font-size="11">Send Confirmation</text>

  <!-- Apply Coupon (extend, dashed oval) -->
  <ellipse cx="155" cy="310" rx="72" ry="22" fill="white" stroke="#888" stroke-width="1.2" stroke-dasharray="4 2"/>
  <text x="155" y="307" text-anchor="middle" font-size="10" fill="#555">[extension]</text>
  <text x="155" y="320" text-anchor="middle" font-size="10" fill="#555">Apply Coupon</text>

  <!-- ─── ACTOR → USE CASE LINES ─── -->
  <!-- Customer → Browse Products -->
  <line x1="105" y1="168" x2="168" y2="110" stroke="#333" stroke-width="1.3"/>
  <!-- Customer → Add Item to Cart -->
  <line x1="105" y1="175" x2="328" y2="108" stroke="#333" stroke-width="1.3"/>
  <!-- Customer → Place Order -->
  <line x1="105" y1="192" x2="168" y2="198" stroke="#333" stroke-width="1.3"/>
  <!-- Customer → Cancel Order -->
  <line x1="105" y1="200" x2="328" y2="200" stroke="#333" stroke-width="1.3"/>
  <!-- Customer → Apply Coupon (dashed) -->
  <line x1="88" y1="215" x2="120" y2="300" stroke="#888" stroke-width="1.1" stroke-dasharray="3 2"/>

  <!-- Payment Gateway → Process Payment -->
  <line x1="550" y1="166" x2="398" y2="305" stroke="#333" stroke-width="1.3"/>
  <!-- Payment Gateway → Process Refund -->
  <line x1="550" y1="175" x2="502" y2="385" stroke="#333" stroke-width="1.3"/>
  <!-- Email Service → Send Confirmation -->
  <line x1="550" y1="400" x2="375" y2="474" stroke="#333" stroke-width="1.3"/>

  <!-- ─── INCLUDE / EXTEND RELATIONSHIPS ─── -->
  <!-- Place Order --include--> Process Payment -->
  <line x1="263" y1="222" x2="296" y2="288" stroke="#333" stroke-width="1.2"
        stroke-dasharray="5 3" marker-end="url(#open)"/>
  <text x="255" y="258" text-anchor="middle" font-size="9" fill="#333">«include»</text>

  <!-- Place Order --include--> Send Confirmation -->
  <line x1="220" y1="222" x2="255" y2="458" stroke="#333" stroke-width="1.2"
        stroke-dasharray="5 3" marker-end="url(#open)"/>
  <text x="198" y="350" text-anchor="middle" font-size="9" fill="#333">«include»</text>

  <!-- Cancel Order --extend--> Process Refund -->
  <line x1="402" y1="222" x2="428" y2="368" stroke="#333" stroke-width="1.2"
        stroke-dasharray="5 3" marker-end="url(#open)"/>
  <text x="432" y="298" text-anchor="middle" font-size="9" fill="#333">«extend»</text>

  <!-- Apply Coupon --extend--> Place Order -->
  <line x1="205" y1="304" x2="220" y2="214" stroke="#888" stroke-width="1.1"
        stroke-dasharray="4 2" marker-end="url(#open)"/>
  <text x="192" y="262" text-anchor="middle" font-size="9" fill="#888">«extend»</text>

  <!-- Browse Products → Add Item to Cart (sequence) -->
  <line x1="312" y1="100" x2="328" y2="100" stroke="#333" stroke-width="1.1" stroke-dasharray="3 2"/>

  <!-- Trigger note -->
  <rect x="130" y="154" width="120" height="30" rx="4" fill="#fffde7" stroke="#ccaa00" stroke-width="1"/>
  <text x="190" y="168" text-anchor="middle" font-size="8" font-style="italic">Trigger: Customer clicks</text>
  <text x="190" y="180" text-anchor="middle" font-size="8" font-style="italic">'Place Order' button</text>
  <line x1="190" y1="184" x2="215" y2="193" stroke="#ccaa00" stroke-width="0.8" stroke-dasharray="2 1"/>

  <!-- Caption -->
  <text x="310" y="585" text-anchor="middle" font-size="10" font-style="italic" fill="#444">
    Full use case diagram generated by FlowGenAI for a sample e-commerce requirement.
  </text>
</svg>
