<?xml version="1.0" encoding="UTF-8"?>
<svg width="720" height="320" viewBox="0 0 720 320"
     xmlns="http://www.w3.org/2000/svg"
     font-family="Times New Roman, Georgia, serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <marker id="arrup" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="20" text-anchor="middle" font-size="13" font-weight="bold">
    Fig. 2. LLM-Based Use Case Extraction and Element Mapping
  </text>

  <!-- ─── SECTION LABEL LEFT ─── -->
  <text x="14" y="108" text-anchor="middle" font-size="10" font-weight="bold"
        transform="rotate(-90,14,150)">LLM Extraction</text>
  <text x="14" y="246" text-anchor="middle" font-size="10" font-weight="bold"
        transform="rotate(-90,14,246)">Mapping</text>
  <line x1="26" y1="34" x2="26" y2="290" stroke="#aaa" stroke-width="1"/>

  <!-- ─── INPUT REQUIREMENT (top row) ─── -->
  <!-- Word boxes for the sentence -->
  <!-- "As" -->
  <rect x="36" y="55" width="28" height="26" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="50" y="72" text-anchor="middle" font-size="10">As</text>
  <text x="50" y="47" text-anchor="middle" font-size="8" fill="#555">ADP</text>

  <!-- "a" -->
  <rect x="68" y="55" width="22" height="26" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="79" y="72" text-anchor="middle" font-size="10">a</text>
  <text x="79" y="47" text-anchor="middle" font-size="8" fill="#555">DET</text>

  <!-- "Customer" — actor word, green dashed border -->
  <rect x="94" y="52" width="76" height="32" rx="3" fill="white" stroke="#2a7a2a" stroke-width="1.8" stroke-dasharray="4 2"/>
  <text x="132" y="72" text-anchor="middle" font-size="11" font-weight="bold">Customer</text>
  <text x="132" y="44" text-anchor="middle" font-size="8" fill="#555">PROPN</text>

  <!-- "," -->
  <rect x="174" y="55" width="16" height="26" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="182" y="72" text-anchor="middle" font-size="10">,</text>

  <!-- "I" -->
  <rect x="194" y="55" width="20" height="26" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="204" y="72" text-anchor="middle" font-size="10">I</text>
  <text x="204" y="47" text-anchor="middle" font-size="8" fill="#555">PRON</text>

  <!-- "want" -->
  <rect x="218" y="55" width="40" height="26" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="238" y="72" text-anchor="middle" font-size="10">want</text>
  <text x="238" y="47" text-anchor="middle" font-size="8" fill="#555">VERB</text>

  <!-- "to" -->
  <rect x="262" y="55" width="24" height="26" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="274" y="72" text-anchor="middle" font-size="10">to</text>
  <text x="274" y="47" text-anchor="middle" font-size="8" fill="#555">PART</text>

  <!-- "place" — use case verb, green dashed -->
  <rect x="290" y="52" width="44" height="32" rx="3" fill="white" stroke="#2a7a2a" stroke-width="1.8" stroke-dasharray="4 2"/>
  <text x="312" y="72" text-anchor="middle" font-size="11" font-weight="bold">place</text>
  <text x="312" y="44" text-anchor="middle" font-size="8" fill="#555">VERB</text>

  <!-- "an" -->
  <rect x="338" y="55" width="24" height="26" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="350" y="72" text-anchor="middle" font-size="10">an</text>
  <text x="350" y="47" text-anchor="middle" font-size="8" fill="#555">DET</text>

  <!-- "order" — use case noun, green dashed -->
  <rect x="366" y="52" width="48" height="32" rx="3" fill="white" stroke="#2a7a2a" stroke-width="1.8" stroke-dasharray="4 2"/>
  <text x="390" y="72" text-anchor="middle" font-size="11" font-weight="bold">order</text>
  <text x="390" y="44" text-anchor="middle" font-size="8" fill="#555">NOUN</text>

  <!-- "on" -->
  <rect x="418" y="55" width="24" height="26" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="430" y="72" text-anchor="middle" font-size="10">on</text>
  <text x="430" y="47" text-anchor="middle" font-size="8" fill="#555">ADP</text>

  <!-- "the" -->
  <rect x="446" y="55" width="28" height="26" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="460" y="72" text-anchor="middle" font-size="10">the</text>
  <text x="460" y="47" text-anchor="middle" font-size="8" fill="#555">DET</text>

  <!-- "e-commerce" — entity, green dashed -->
  <rect x="478" y="52" width="84" height="32" rx="3" fill="white" stroke="#2a7a2a" stroke-width="1.8" stroke-dasharray="4 2"/>
  <text x="520" y="72" text-anchor="middle" font-size="11" font-weight="bold">e-commerce</text>
  <text x="520" y="44" text-anchor="middle" font-size="8" fill="#555">NOUN</text>

  <!-- "platform" — entity continued, green dashed -->
  <rect x="566" y="52" width="68" height="32" rx="3" fill="white" stroke="#2a7a2a" stroke-width="1.8" stroke-dasharray="4 2"/>
  <text x="600" y="72" text-anchor="middle" font-size="11" font-weight="bold">platform</text>
  <text x="600" y="44" text-anchor="middle" font-size="8" fill="#555">NOUN</text>

  <!-- LLM box (center extraction box) -->
  <rect x="250" y="96" width="220" height="34" rx="6"
        fill="#f0f0f0" stroke="#444" stroke-width="1.8"/>
  <text x="360" y="114" text-anchor="middle" font-size="11" font-weight="bold">GPT-4o-mini LLM Extraction</text>
  <text x="360" y="126" text-anchor="middle" font-size="9">(structured JSON output)</text>

  <!-- ─── ARROWS: words → LLM box ─── -->
  <line x1="132" y1="84" x2="280" y2="96" stroke="#555" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <line x1="351" y1="84" x2="355" y2="96" stroke="#555" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <line x1="560" y1="84" x2="440" y2="96" stroke="#555" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)"/>

  <!-- ─── ARROWS: LLM → diagram elements (bottom) ─── -->
  <!-- → Actor -->
  <line x1="282" y1="130" x2="118" y2="178" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- → Use Case -->
  <line x1="340" y1="130" x2="340" y2="178" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- → Trigger -->
  <line x1="380" y1="130" x2="490" y2="178" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- → Entity -->
  <line x1="430" y1="130" x2="620" y2="178" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- ─── DIAGRAM ELEMENTS (bottom row) ─── -->

  <!-- Actor: Customer (stick figure) -->
  <circle cx="118" cy="196" r="10" fill="white" stroke="#333" stroke-width="1.8"/>
  <line x1="118" y1="206" x2="118" y2="228" stroke="#333" stroke-width="1.8"/>
  <line x1="106" y1="214" x2="130" y2="214" stroke="#333" stroke-width="1.8"/>
  <line x1="118" y1="228" x2="110" y2="242" stroke="#333" stroke-width="1.8"/>
  <line x1="118" y1="228" x2="126" y2="242" stroke="#333" stroke-width="1.8"/>
  <text x="118" y="258" text-anchor="middle" font-size="10">Customer</text>
  <text x="118" y="270" text-anchor="middle" font-size="9" fill="#555">[primary actor]</text>

  <!-- Use Case: Place Order (oval) -->
  <ellipse cx="340" cy="212" rx="58" ry="22" fill="white" stroke="#333" stroke-width="1.8"/>
  <text x="340" y="216" text-anchor="middle" font-size="11">Place Order</text>
  <text x="340" y="248" text-anchor="middle" font-size="9" fill="#555">[use case]</text>
  <text x="340" y="260" text-anchor="middle" font-size="9" fill="#555">"Verb + Noun"</text>

  <!-- Trigger note box -->
  <rect x="430" y="188" width="148" height="42" rx="4"
        fill="#fffde7" stroke="#bbb" stroke-width="1.2"/>
  <text x="504" y="206" text-anchor="middle" font-size="9" font-style="italic">Customer clicks</text>
  <text x="504" y="218" text-anchor="middle" font-size="9" font-style="italic">'Place Order' button</text>
  <text x="504" y="244" text-anchor="middle" font-size="9" fill="#555">[trigger event]</text>

  <!-- Entity: E-Commerce Platform (circle) -->
  <circle cx="638" cy="210" r="20" fill="white" stroke="#333" stroke-width="1.8"/>
  <text x="638" y="207" text-anchor="middle" font-size="8">E-Commerce</text>
  <text x="638" y="218" text-anchor="middle" font-size="8">Platform</text>
  <text x="638" y="248" text-anchor="middle" font-size="9" fill="#555">[entity]</text>

  <!-- Extraction labels above arrows -->
  <text x="185" y="160" text-anchor="middle" font-size="9" fill="#2a7a2a" font-style="italic">actor</text>
  <text x="340" y="160" text-anchor="middle" font-size="9" fill="#2a7a2a" font-style="italic">use_case</text>
  <text x="445" y="160" text-anchor="middle" font-size="9" fill="#2a7a2a" font-style="italic">trigger</text>
  <text x="558" y="160" text-anchor="middle" font-size="9" fill="#2a7a2a" font-style="italic">entity</text>

  <!-- Bottom caption -->
  <text x="360" y="298" text-anchor="middle" font-size="10" font-style="italic" fill="#444">
    Business requirement sentence → LLM JSON extraction → use case diagram elements
  </text>
</svg>
