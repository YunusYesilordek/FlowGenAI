<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="520" viewBox="0 0 600 520"
     xmlns="http://www.w3.org/2000/svg"
     font-family="Times New Roman, Georgia, serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <marker id="open" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polyline points="0 0, 9 3.5, 0 7" fill="none" stroke="#333" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="20" text-anchor="middle" font-size="13" font-weight="bold">
    Fig. 4. Viewpoint-Based Use Case Diagram — Customer Perspective
  </text>

  <!-- ─── SYSTEM BOUNDARY ─── -->
  <rect x="110" y="34" width="390" height="460" rx="10"
        fill="white" stroke="#333" stroke-width="2"/>
  <text x="305" y="52" text-anchor="middle" font-size="11" font-weight="bold">«System» — Customer Viewpoint</text>
  <text x="305" y="64" text-anchor="middle" font-size="10">E-Commerce Order Management System</text>

  <!-- ─── CUSTOMER ACTOR ─── -->
  <circle cx="52" cy="248" r="13" fill="white" stroke="#333" stroke-width="2"/>
  <line x1="52" y1="261" x2="52" y2="290" stroke="#333" stroke-width="2"/>
  <line x1="38" y1="272" x2="66" y2="272" stroke="#333" stroke-width="2"/>
  <line x1="52" y1="290" x2="40" y2="308" stroke="#333" stroke-width="2"/>
  <line x1="52" y1="290" x2="64" y2="308" stroke="#333" stroke-width="2"/>
  <text x="52" y="322" text-anchor="middle" font-size="12">Customer</text>
  <text x="52" y="335" text-anchor="middle" font-size="9" fill="#555">«primary»</text>

  <!-- ─── USE CASES in Customer's view ─── -->

  <!-- Browse Products -->
  <ellipse cx="248" cy="110" rx="80" ry="24" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="248" y="114" text-anchor="middle" font-size="11">Browse Products</text>

  <!-- Add Item to Cart -->
  <ellipse cx="420" cy="110" rx="80" ry="24" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="420" y="114" text-anchor="middle" font-size="11">Add Item to Cart</text>

  <!-- Place Order (highlighted - main use case) -->
  <ellipse cx="248" cy="220" rx="80" ry="24" fill="white" stroke="#111" stroke-width="2.5"/>
  <text x="248" y="224" text-anchor="middle" font-size="12" font-weight="bold">Place Order</text>

  <!-- Cancel Order -->
  <ellipse cx="420" cy="220" rx="80" ry="24" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="420" y="224" text-anchor="middle" font-size="11">Cancel Order</text>

  <!-- Process Payment (included, greyed) -->
  <ellipse cx="300" cy="340" rx="80" ry="24" fill="#f0f0f0" stroke="#666" stroke-width="1.5"/>
  <text x="300" y="337" text-anchor="middle" font-size="10" fill="#555">Process Payment</text>
  <text x="300" y="350" text-anchor="middle" font-size="9" fill="#888">[Payment Gateway]</text>

  <!-- Send Confirmation (included, greyed) -->
  <ellipse cx="300" cy="430" rx="90" ry="24" fill="#f0f0f0" stroke="#666" stroke-width="1.5"/>
  <text x="300" y="427" text-anchor="middle" font-size="10" fill="#555">Send Confirmation</text>
  <text x="300" y="440" text-anchor="middle" font-size="9" fill="#888">[Email Service]</text>

  <!-- Process Refund (extend, dashed) -->
  <ellipse cx="430" cy="340" rx="72" ry="22" fill="white" stroke="#888" stroke-width="1.2" stroke-dasharray="4 2"/>
  <text x="430" y="337" text-anchor="middle" font-size="10" fill="#555">Process Refund</text>
  <text x="430" y="350" text-anchor="middle" font-size="9" fill="#888">[Payment Gateway]</text>

  <!-- ─── ACTOR → USE CASE CONNECTIONS ─── -->
  <line x1="100" y1="237" x2="168" y2="118" stroke="#333" stroke-width="1.4"/>
  <line x1="100" y1="245" x2="340" y2="118" stroke="#333" stroke-width="1.4"/>
  <line x1="100" y1="255" x2="168" y2="218" stroke="#333" stroke-width="1.4"/>
  <line x1="100" y1="260" x2="340" y2="222" stroke="#333" stroke-width="1.4"/>

  <!-- ─── INCLUDE / EXTEND ─── -->
  <!-- Place Order --include--> Process Payment -->
  <line x1="270" y1="244" x2="290" y2="316" stroke="#333" stroke-width="1.2"
        stroke-dasharray="5 3" marker-end="url(#open)"/>
  <text x="255" y="284" text-anchor="middle" font-size="9" fill="#333">«include»</text>

  <!-- Place Order --include--> Send Confirmation -->
  <line x1="240" y1="244" x2="268" y2="406" stroke="#333" stroke-width="1.2"
        stroke-dasharray="5 3" marker-end="url(#open)"/>
  <text x="226" y="330" text-anchor="middle" font-size="9" fill="#333">«include»</text>

  <!-- Cancel Order --extend--> Process Refund -->
  <line x1="420" y1="244" x2="428" y2="318" stroke="#333" stroke-width="1.2"
        stroke-dasharray="5 3" marker-end="url(#open)"/>
  <text x="450" y="284" text-anchor="middle" font-size="9" fill="#333">«extend»</text>

  <!-- Viewpoint filter note -->
  <rect x="120" y="462" width="370" height="24" rx="4" fill="#fffde7" stroke="#ccaa00" stroke-width="1"/>
  <text x="305" y="478" text-anchor="middle" font-size="9" font-style="italic">
    Grey ovals = elements included in flow but owned by other actors (hidden in full isolation)
  </text>

  <!-- Caption -->
  <text x="300" y="508" text-anchor="middle" font-size="10" font-style="italic" fill="#444">
    Viewpoint-based diagram filtered to the Customer actor's perspective.
  </text>
</svg>
